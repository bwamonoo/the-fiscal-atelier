<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fiscal Atelier - Add Transaction</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar (Same as index) -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="brand">The Fiscal Atelier</h1>
                <p class="tagline">Wealth Curation</p>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="transactions.html" class="nav-item">
                    <i data-lucide="receipt-text"></i>
                    <span>Transactions</span>
                </a>
            </nav>
            <div class="sidebar-action">
                <a href="add-transaction.html" class="btn btn-primary btn-block active">
                    <i data-lucide="plus"></i>
                    <span>Add Transaction</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2 class="page-title">Transaction Management</h2>
                <div class="top-bar-actions">
                    <button class="icon-btn"><i data-lucide="bell"></i></button>
                    <div class="user-profile"><img src="https://picsum.photos/seed/user/100/100" alt="User"></div>
                </div>
            </header>

            <div class="content-wrapper centered">
                <div class="breadcrumb">
                    <span>Ledger</span> <i data-lucide="chevron-right"></i> <span class="active">New Entry</span>
                </div>

                <div class="form-card">
                    <div class="accent-line"></div>
                    <form>
                        <div class="form-group">
                            <label>Transaction Type</label>
                            <div class="toggle-group">
                                <button type="button" class="toggle-btn active"><i data-lucide="minus-circle"></i> Expense</button>
                                <button type="button" class="toggle-btn"><i data-lucide="plus-circle"></i> Income</button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Total Amount</label>
                            <div class="amount-input">
                                <span class="currency">$</span>
                                <input type="text" placeholder="0.00">
                            </div>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label>Category</label>
                                <select><option>Select Category</option></select>
                            </div>
                            <div class="form-group">
                                <label>Date of Transaction</label>
                                <input type="date">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Note / Description</label>
                            <textarea placeholder="What was this transaction for?" rows="2"></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary btn-large">Save Transaction</button>
                            <a href="index.html" class="btn btn-outline btn-large">Cancel</a>
                        </div>
                    </form>
                </div>

                <div class="tip-box">
                    <i data-lucide="lightbulb"></i>
                    <div class="tip-content">
                        <h5>Atelier Wisdom</h5>
                        <p>Categorizing transactions accurately helps our AI curator provide better insights into your spending habits.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
